<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>NBS — Banking Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --pink: #ff0080;
  --pink-dim: rgba(255,0,128,0.10);
  --pink-border: rgba(255,0,128,0.28);
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.11);
  --text: #f0f0f0;
  --text-dim: rgba(240,240,240,0.55);
  --text-muted: rgba(240,240,240,0.25);
  --green: #4ade80;
  --red: #f87171;
  --font: 'Inter', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; }
body { display: flex; flex-direction: column; align-items: center; min-height: 100dvh; overflow: hidden; }
.shell { width: 100%; max-width: 780px; height: 100dvh; display: flex; flex-direction: column; }

/* Header */
header { flex-shrink: 0; height: 58px; padding: 0 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); background: var(--bg); }
.logo { width: 34px; height: 34px; border-radius: 8px; background: var(--pink-dim); border: 1px solid var(--pink-border); display: grid; place-items: center; flex-shrink: 0; }
.brand { flex: 1; }
.brand-name { font-size: 15px; font-weight: 600; color: var(--text); }
.brand-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.lang-toggle { display: flex; background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px; overflow: hidden; position: relative; }
.lang-btn { font-size: 11px; font-weight: 500; font-family: var(--font); color: var(--text-dim); background: none; border: none; padding: 5px 10px; cursor: pointer; transition: all 0.15s; }
.lang-btn.active { background: var(--pink-dim); color: var(--pink); }
.lang-auto-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--pink); position: absolute; top: 3px; right: 3px; display: none; }
.lang-auto-dot.visible { display: block; }
.online-badge { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 100px; background: rgba(74,222,128,0.07); border: 1px solid rgba(74,222,128,0.18); font-size: 11px; font-weight: 500; color: var(--green); }
.online-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 2s ease infinite; }
.clear-btn { width: 32px; height: 32px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px; cursor: pointer; display: grid; place-items: center; color: var(--text-dim); transition: all 0.15s; }
.clear-btn:hover { border-color: var(--pink-border); color: var(--pink); }

/* Chat */
.chat-wrap { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: var(--bg4) transparent; }
.chat-wrap::-webkit-scrollbar { width: 3px; }
.chat-wrap::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* Welcome */
.welcome { animation: fadeUp 0.5s ease both; }
.welcome-heading { font-size: clamp(24px, 5vw, 36px); font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 8px; }
.welcome-heading span { color: var(--pink); }
.welcome-sub { font-size: 14px; color: var(--text-dim); font-weight: 300; line-height: 1.6; margin-bottom: 28px; max-width: 420px; }
.cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.service-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; padding: 18px 16px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
.service-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--pink); opacity: 0; transition: opacity 0.2s; }
.service-card:hover { border-color: var(--pink-border); background: var(--bg3); }
.service-card:hover::before { opacity: 1; }
.service-card:active { transform: scale(0.98); }
.card-icon { width: 32px; height: 32px; background: var(--pink-dim); border: 1px solid var(--pink-border); border-radius: 8px; display: grid; place-items: center; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.card-desc { font-size: 12px; color: var(--text-dim); font-weight: 300; line-height: 1.5; }
.divider { height: 1px; background: var(--border); margin-bottom: 16px; }
.quick-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
.quick-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.quick-chip { padding: 7px 14px; border-radius: 100px; border: 1px solid var(--border2); background: var(--bg2); font-size: 12px; color: var(--text-dim); cursor: pointer; font-family: var(--font); transition: all 0.15s; }
.quick-chip:hover { border-color: var(--pink-border); color: var(--pink); background: var(--pink-dim); }

/* Messages */
.message { display: flex; gap: 10px; animation: fadeUp 0.25s ease both; opacity: 0; }
.message.user { flex-direction: row-reverse; }
.avatar { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: grid; place-items: center; margin-top: 2px; }
.message.bot .avatar { background: var(--pink-dim); border: 1px solid var(--pink-border); }
.message.user .avatar { background: var(--bg3); border: 1px solid var(--border2); font-size: 11px; font-weight: 600; color: var(--text-dim); }
.msg-body { display: flex; flex-direction: column; max-width: 75%; }
.message.user .msg-body { align-items: flex-end; }
.bubble { padding: 12px 15px; font-size: 13.5px; line-height: 1.65; font-weight: 300; border-radius: 4px 12px 12px 12px; }
.message.bot .bubble { background: var(--bg2); border: 1px solid var(--border2); color: var(--text); }
.message.user .bubble { background: var(--pink); border-radius: 12px 4px 12px 12px; color: #fff; font-weight: 400; }
.message.bot .bubble.sentiment-negative { border-left: 2px solid var(--red); background: #160808; border-top-color: var(--border2); border-right-color: var(--border2); border-bottom-color: var(--border2); }
.message.bot .bubble.sentiment-positive { border-left: 2px solid var(--green); background: #061308; border-top-color: var(--border2); border-right-color: var(--border2); border-bottom-color: var(--border2); }
.urgent-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(248,113,113,0.10); border: 1px solid rgba(248,113,113,0.2); border-radius: 100px; padding: 2px 9px; font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--red); margin-bottom: 8px; }
.positive-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); border-radius: 100px; padding: 2px 9px; font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--green); margin-bottom: 8px; }
.empathy-note { background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.15); border-radius: 7px; padding: 8px 11px; font-size: 12px; color: #fca5a5; margin-bottom: 10px; line-height: 1.5; }
.message.bot .bubble strong { color: var(--pink); font-weight: 500; }
.message.bot .bubble ul, .message.bot .bubble ol { padding-left: 16px; margin: 5px 0; }
.message.bot .bubble li { margin-bottom: 4px; color: var(--text); font-size: 13px; }
.message.bot .bubble p { margin-bottom: 6px; }
.message.bot .bubble p:last-child { margin-bottom: 0; }
.msg-time { font-size: 10px; color: var(--text-muted); margin-top: 5px; padding: 0 2px; }
.msg-actions { display: flex; align-items: center; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
.act-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 11px; font-weight: 400; color: var(--text-dim); font-family: var(--font); display: flex; align-items: center; gap: 4px; transition: all 0.15s; }
.act-btn:hover { color: var(--text); border-color: var(--border2); }
.act-btn.playing { color: var(--pink); border-color: var(--pink-border); background: var(--pink-dim); }
.act-btn.copied { color: var(--green); border-color: rgba(74,222,128,0.25); }
.followups { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.followup-chip { padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border2); background: var(--bg2); font-size: 11.5px; color: var(--text-dim); cursor: pointer; font-family: var(--font); transition: all 0.15s; }
.followup-chip:hover { border-color: var(--pink-border); color: var(--pink); background: var(--pink-dim); }
.error-bubble { background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.18); border-radius: 4px 12px 12px 12px; color: var(--red); padding: 12px 15px; font-size: 13px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.retry-btn { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.22); border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: var(--font); }
.typing .bubble { display: flex; align-items: center; gap: 5px; padding: 16px 18px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.1s ease infinite; }
.dot:nth-child(2) { animation-delay: .16s; } .dot:nth-child(3) { animation-delay: .32s; }
.lang-detected-banner { display: flex; align-items: center; gap: 8px; background: var(--pink-dim); border: 1px solid var(--pink-border); border-radius: 8px; padding: 7px 13px; font-size: 12px; color: var(--pink); animation: fadeUp 0.3s ease both; }
.lang-detected-banner button { background: none; border: none; color: var(--pink); font-size: 11px; text-decoration: underline; cursor: pointer; font-family: var(--font); padding: 0; margin-left: auto; opacity: 0.7; }
.lang-detected-banner button:hover { opacity: 1; }

/* Autocomplete */
.autocomplete { width: 100%; max-width: 780px; padding: 0 20px; display: none; }
.autocomplete.visible { display: block; }
.autocomplete-inner { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.autocomplete-inner::-webkit-scrollbar { display: none; }
.ac-chip { padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border2); background: var(--bg2); font-size: 11.5px; color: var(--text-dim); cursor: pointer; white-space: nowrap; font-family: var(--font); flex-shrink: 0; transition: all 0.15s; }
.ac-chip:hover { color: var(--pink); border-color: var(--pink-border); background: var(--pink-dim); }

/* Input */
.input-area { flex-shrink: 0; padding: 10px 20px calc(env(safe-area-inset-bottom, 0px) + 14px); border-top: 1px solid var(--border); background: var(--bg); }
.input-box { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; padding: 8px 8px 8px 14px; transition: border-color 0.2s; }
.input-box:focus-within { border-color: var(--pink-border); }
#userInput { flex: 1; background: none; border: none; outline: none; font-family: var(--font); font-size: 14px; font-weight: 300; color: var(--text); resize: none; max-height: 120px; line-height: 1.5; }
#userInput::placeholder { color: var(--text-muted); }
#micBtn { width: 34px; height: 34px; border-radius: 8px; background: var(--bg3); border: 1px solid var(--border2); cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: all 0.15s; color: var(--text-dim); }
#micBtn:hover { border-color: var(--pink-border); color: var(--pink); }
#micBtn.listening { background: var(--pink-dim); border-color: var(--pink-border); color: var(--pink); animation: pulse 1s ease infinite; }
#sendBtn { width: 34px; height: 34px; border-radius: 8px; background: var(--pink); border: none; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: all 0.15s; }
#sendBtn:hover { opacity: 0.88; } #sendBtn:active { transform: scale(0.95); } #sendBtn:disabled { background: var(--bg4); cursor: not-allowed; }
.input-hint { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 7px; display: none; }
@media(min-width:580px) { .input-hint { display: block; } }
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--bg3); border: 1px solid var(--pink-border); color: var(--pink); font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 100px; opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
        <rect x="2" y="5" width="16" height="11" rx="3" stroke="#ff0080" stroke-width="1.4"/>
        <path d="M6 9h3M6 12h2" stroke="#ff0080" stroke-width="1.4" stroke-linecap="round"/>
        <rect x="13" y="9.5" width="2.5" height="2.5" rx=".8" fill="#ff0080" opacity=".7"/>
        <path d="M2 8h16" stroke="#ff0080" stroke-width="1.2" opacity=".4"/>
      </svg>
    </div>
    <div class="brand">
      <div class="brand-name">National Banking Services</div>
      <div class="brand-sub">Support Assistant</div>
    </div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnEn" onclick="setLangManual('en')">EN</button>
        <button class="lang-btn" id="btnHi" onclick="setLangManual('hi')">हि</button>
        <div class="lang-auto-dot" id="langAutoDot"></div>
      </div>
      <div class="online-badge"><div class="online-dot"></div>Online</div>
      <button class="clear-btn" onclick="clearChat()" title="Clear chat">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 4.5 16.5 13.5 16.5 15 6"/>
          <path d="M6 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          <line x1="1.5" y1="6" x2="16.5" y2="6"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="chat-wrap" id="chatWrap"></div>

  <div class="autocomplete" id="autocomplete">
    <div class="autocomplete-inner" id="autocompleteInner"></div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="userInput" rows="1" placeholder="Ask anything about your banking…"></textarea>
      <button id="micBtn" onclick="toggleVoice()" title="Voice input">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <rect x="6" y="1" width="6" height="9" rx="3"/>
          <path d="M3 8a6 6 0 0 0 12 0"/>
          <line x1="9" y1="17" x2="9" y2="14"/>
          <line x1="6" y1="17" x2="12" y2="17"/>
        </svg>
      </button>
      <button id="sendBtn" onclick="sendMessage()">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="16" y1="2" x2="8" y2="10"/>
          <polygon points="16 2 11 16 8 10 2 7 16 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line · Mic for voice</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const chatWrap = document.getElementById('chatWrap');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const autocompleteEl = document.getElementById('autocomplete');
const autocompleteInner = document.getElementById('autocompleteInner');
const langAutoDot = document.getElementById('langAutoDot');

const API_URL    = 'https://support-agent-production-ce11.up.railway.app/chat';
const TTS_URL    = 'https://support-agent-production-ce11.up.railway.app/tts';
const DETECT_URL = 'https://support-agent-production-ce11.up.railway.app/detect-language';
const EMI_URL    = 'https://support-agent-production-ce11.up.railway.app/calculate-emi';
const sessionId  = 'user_' + Math.random().toString(36).slice(2, 9);
const STORAGE_KEY = 'nbs_v3';

let langMode = sessionStorage.getItem('nbs_lang_mode') || 'auto';
let lang     = sessionStorage.getItem('nbs_lang') || 'en';
let currentAudio = null;

const I18N = {
  en: {
    placeholder: 'Ask anything about your banking…',
    h1: 'Hi there 👋',
    h2: 'How can we <span>help you</span> today?',
    sub: 'Ask me anything about accounts, loans, transfers, or any banking service.',
    cards: [
      { label: 'Savings Account', desc: 'Rates, benefits & how to open', query: 'Tell me about savings account rates and benefits' },
      { label: 'Loans & Credit',  desc: 'Apply, eligibility & EMI',      query: 'How do I apply for a loan and what are the requirements?' },
    ],
    quick_label: 'Quick questions',
    quick: ['Minimum balance?', 'Reset my PIN'],
    followups: {
      savings: ['Min balance?', 'How to open?', 'Interest taxable?'],
      loan:    ['Documents needed?', 'Interest rate?', 'Approval time?'],
      credit:  ['How to apply?', 'Credit limit?', 'Annual fee?'],
      default: ['Tell me more', 'What are the fees?', 'How do I proceed?']
    },
    listening: 'Listening…', conn_error: 'Connection error. Please check your internet.', copied: 'Copied', retry: 'Retry',
  },
  hi: {
    placeholder: 'बैंकिंग से जुड़ा कोई भी सवाल पूछें…',
    h1: 'नमस्ते 👋',
    h2: 'आज हम आपकी <span>कैसे मदद</span> करें?',
    sub: 'खाते, लोन, ट्रांसफर या किसी भी बैंकिंग सेवा के बारे में पूछें।',
    cards: [
      { label: 'बचत खाता',        desc: 'दरें, लाभ और खाता खोलने की प्रक्रिया', query: 'बचत खाते की ब्याज दर और लाभ बताएं' },
      { label: 'लोन और क्रेडिट', desc: 'आवेदन, पात्रता और EMI',                 query: 'लोन के लिए कैसे आवेदन करें?' },
    ],
    quick_label: 'जल्दी पूछें',
    quick: ['न्यूनतम बैलेंस?', 'पिन रीसेट'],
    followups: {
      savings: ['न्यूनतम बैलेंस?', 'खाता कैसे खोलें?', 'ब्याज पर टैक्स?'],
      loan:    ['दस्तावेज़?', 'ब्याज दर?', 'अनुमोदन समय?'],
      credit:  ['कैसे आवेदन करें?', 'क्रेडिट लिमिट?', 'वार्षिक शुल्क?'],
      default: ['और बताएं', 'शुल्क क्या हैं?', 'कैसे आगे बढ़ें?']
    },
    listening: 'सुन रहा हूँ…', conn_error: 'कनेक्शन त्रुटि। इंटरनेट जाँचें।', copied: 'कॉपी हो गया', retry: 'पुनः प्रयास',
  }
};

function t() { return I18N[lang]; }

const BOT_ICON = `<svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="#ff0080" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="14" height="10" rx="3"/><path d="M10 2v4"/><circle cx="10" cy="2" r="1.2" fill="#ff0080" stroke="none"/><circle cx="7" cy="11" r="1.2" fill="#ff0080" stroke="none" opacity=".7"/><circle cx="13" cy="11" r="1.2" fill="#ff0080" stroke="none" opacity=".7"/></svg>`;

function applyLang(newLang, mode) {
  lang = newLang; langMode = mode;
  sessionStorage.setItem('nbs_lang', lang); sessionStorage.setItem('nbs_lang_mode', langMode);
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('btnHi').classList.toggle('active', lang === 'hi');
  langAutoDot.classList.toggle('visible', langMode === 'auto');
  userInput.placeholder = t().placeholder;
}

function setLangManual(l) {
  applyLang(l, 'manual');
  const w = document.getElementById('welcome'); if (w) { w.remove(); renderWelcome(); }
}

async function autoDetectLang(text) {
  if (langMode === 'manual' || text.length < 4) return lang;
  try {
    const res = await fetch(DETECT_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    const data = await res.json();
    const detected = data.detected_lang || 'en';
    if (detected !== lang) { showLangBanner(detected); applyLang(detected, 'auto'); }
    return detected;
  } catch { return lang; }
}

function showLangBanner(detected) {
  document.querySelectorAll('.lang-detected-banner').forEach(b => b.remove());
  const b = document.createElement('div'); b.className = 'lang-detected-banner';
  const opp = detected === 'hi' ? 'en' : 'hi';
  b.innerHTML = `<span>${detected === 'hi' ? '🌐 Hindi detected' : '🌐 English detected'}</span>
    <button onclick="setLangManual('${opp}');this.closest('.lang-detected-banner').remove();">${detected === 'hi' ? 'Keep English' : 'हिंदी रखें'}</button>`;
  chatWrap.appendChild(b); chatWrap.scrollTop = chatWrap.scrollHeight;
  setTimeout(() => b.remove(), 5000);
}

function speakerIcon() {
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
}

async function speakText(text, btn, ttsLang) {
  if (currentAudio) {
    currentAudio.pause(); currentAudio = null;
    document.querySelectorAll('.act-btn.playing').forEach(b => { b.classList.remove('playing'); b.innerHTML = speakerIcon() + ' Listen'; });
    if (btn.dataset.wasPlaying === 'true') { btn.dataset.wasPlaying = ''; return; }
  }
  btn.classList.add('playing'); btn.innerHTML = speakerIcon() + ' Playing…'; btn.dataset.wasPlaying = 'true';
  try {
    const res = await fetch(TTS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: text.slice(0, 500), lang: ttsLang }) });
    if (!res.ok) throw new Error();
    const blob = await res.blob(); const url = URL.createObjectURL(blob);
    const audio = new Audio(url); currentAudio = audio; audio.play();
    audio.onended = () => { btn.classList.remove('playing'); btn.innerHTML = speakerIcon() + ' Listen'; btn.dataset.wasPlaying = ''; currentAudio = null; URL.revokeObjectURL(url); };
  } catch {
    btn.classList.remove('playing'); btn.innerHTML = speakerIcon() + ' Listen'; btn.dataset.wasPlaying = '';
    if ('speechSynthesis' in window) { const u = new SpeechSynthesisUtterance(text.slice(0, 300)); u.lang = ttsLang === 'hi' ? 'hi-IN' : 'en-IN'; window.speechSynthesis.speak(u); }
  }
}

function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }
function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

function saveHistory() {
  const msgs = [];
  chatWrap.querySelectorAll('.message').forEach(m => {
    const role = m.classList.contains('user') ? 'user' : 'bot';
    const text = m.querySelector('.bubble')?.dataset.raw || m.querySelector('.bubble')?.textContent || '';
    const time = m.querySelector('.msg-time')?.textContent || '';
    if (text) msgs.push({ role, text, time });
  });
  try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(msgs)); } catch(e) {}
}

function loadHistory() {
  try {
    const saved = sessionStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    const msgs = JSON.parse(saved);
    if (!msgs.length) return false;
    msgs.forEach(m => addMessage(m.text, m.role, m.time, true));
    return true;
  } catch(e) { return false; }
}

function getFollowups(text) {
  const lo = text.toLowerCase(), fu = t().followups;
  if (lo.includes('saving') || lo.includes('बचत'))    return fu.savings;
  if (lo.includes('loan')   || lo.includes('लोन'))    return fu.loan;
  if (lo.includes('credit') || lo.includes('क्रेडिट')) return fu.credit;
  return fu.default;
}

function addMessage(text, role, timeStr, silent, sentiment, empathyNote) {
  const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();
  const msg    = document.createElement('div'); msg.className = `message ${role}`;
  const av     = document.createElement('div'); av.className = 'avatar';
  if (role === 'bot') av.innerHTML = BOT_ICON; else av.textContent = 'U';
  const body   = document.createElement('div'); body.className = 'msg-body';
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  bubble.dataset.raw = text;
  if (role === 'bot' && sentiment && sentiment !== 'neutral') bubble.classList.add(`sentiment-${sentiment}`);
  const time = document.createElement('div'); time.className = 'msg-time'; time.textContent = timeStr || getTime();
  body.appendChild(bubble); body.appendChild(time); msg.appendChild(av); msg.appendChild(body); chatWrap.appendChild(msg);
  requestAnimationFrame(() => { msg.style.opacity = '1'; });

  if (role === 'bot') {
    const badge = sentiment === 'negative' ? `<div class="urgent-badge">⚠ Urgent</div>` : sentiment === 'positive' ? `<div class="positive-badge">😊 Positive</div>` : '';
    const empathy = (sentiment === 'negative' && empathyNote) ? `<div class="empathy-note">🤝 ${empathyNote}</div>` : '';
    const fullHtml = badge + empathy + marked.parse(text);
    if (silent) { bubble.innerHTML = fullHtml; addBotActions(body, text, lang); }
    else {
      let i = 0; bubble.textContent = '';
      const iv = setInterval(() => { i++; chatWrap.scrollTop = chatWrap.scrollHeight; if (i >= text.length) { clearInterval(iv); bubble.innerHTML = fullHtml; addBotActions(body, text, lang); saveHistory(); } }, 12);
    }
  } else { bubble.textContent = text; if (!silent) saveHistory(); }
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

async function callAPI(text) {
  addTyping();
  try {
    const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question: text, session_id: sessionId, lang: langMode === 'manual' ? lang : null }) });
    const data = await res.json(); removeTyping();
    if (data.data && data.data.summary) {
      const r = data.data;
      if (langMode === 'auto' && r.detected_lang && r.detected_lang !== lang) applyLang(r.detected_lang, 'auto');
      const details   = r.details   && r.details.length   ? `\n\n**Details:**\n${r.details.map(d => '- ' + d).join('\n')}` : '';
      const nextSteps = r.next_steps && r.next_steps.length ? `\n\n**Next Steps:**\n${r.next_steps.map(s => '- ' + s).join('\n')}` : '';
      const formatted = `${r.summary}${details}${nextSteps}`;
      addMessage(formatted, 'bot', null, false, r.sentiment, r.empathy_note);
    } else { addMessage(data.data?.error || 'Sorry, something went wrong.', 'bot'); }
  } catch {
    removeTyping();
    const msg = document.createElement('div'); msg.className = 'message bot'; msg.style.opacity = '1';
    const av = document.createElement('div'); av.className = 'avatar'; av.innerHTML = BOT_ICON;

  }
  sendBtn.disabled = false; userInput.focus();
}

const EMI_TRIGGERS_EN = ['emi', 'equated monthly', 'calculate loan', 'loan calculator', 'monthly instalment', 'monthly installment', 'how much will i pay', 'loan repayment', 'loan amount', 'home loan emi', 'car loan emi', 'personal loan emi'];
const EMI_TRIGGERS_HI = ['emi', 'ईएमआई', 'मासिक किस्त', 'लोन कैलकुलेटर', 'लोन की किस्त', 'मासिक भुगतान'];

function isEMIQuery(text) {
  const lo = text.toLowerCase();
  return [...EMI_TRIGGERS_EN, ...EMI_TRIGGERS_HI].some(t => lo.includes(t));
}

// Parse numbers from natural language — "10 lakh", "500000", "10,00,000"
function parseAmount(text) {
  const lo = text.toLowerCase().replace(/,/g, '');
  const crore = lo.match(/(\d+\.?\d*)\s*crore/);  if (crore) return parseFloat(crore[1]) * 10000000;
  const lakh  = lo.match(/(\d+\.?\d*)\s*lakh/);   if (lakh)  return parseFloat(lakh[1])  * 100000;
  const k     = lo.match(/(\d+\.?\d*)\s*k\b/);    if (k)     return parseFloat(k[1])     * 1000;
  const plain = lo.match(/(\d+\.?\d*)/);           if (plain) return parseFloat(plain[1]);
  return null;
}

function extractEMIParams(text) {
  const lo = text.toLowerCase();
  // Try to extract principal, rate, tenure from natural language
  const rateMatch    = lo.match(/(\d+\.?\d*)\s*%/);
  const tenureMatch  = lo.match(/(\d+\.?\d*)\s*(year|yr|साल)/);
  const monthMatch   = lo.match(/(\d+\.?\d*)\s*(month|महीने)/);

  // Extract amount — look for lakh/crore/plain number before "loan" or at start
  let principal = null;
  const amtMatch = lo.match(/(\d[\d,.]*\s*(?:lakh|crore|k)?)\s*(?:loan|rupee|rs|₹)?/);
  if (amtMatch) principal = parseAmount(amtMatch[1]);

  return {
    principal:    principal,
    rate:         rateMatch    ? parseFloat(rateMatch[1])   : null,
    tenure_years: tenureMatch  ? parseFloat(tenureMatch[1]) : (monthMatch ? parseFloat(monthMatch[1]) / 12 : null),
  };
}

function formatINR(amount) {
  return '₹' + Math.round(amount).toLocaleString('en-IN');
}

async function handleEMIQuery(text) {
  // Try to extract params from the message
  const params = extractEMIParams(text);
  const p = params.principal || 500000;
  const r = params.rate       || 8.5;
  const t = params.tenure_years || 5;

  addMessage(text, 'user');
  addTyping();
  try {
    const res  = await fetch(EMI_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ principal: p, annual_rate: r, tenure_years: t }) });
    const data = await res.json();
    removeTyping();
    addEMIWidget(p, r, t, data);
  } catch {
    removeTyping();
    await callAPI(text); // fallback to normal chat
  }
  sendBtn.disabled = false; userInput.focus();
}

async function sendMessage() {
  const text = userInput.value.trim(); if (!text) return;
  userInput.value = ''; userInput.style.height = 'auto'; hideAutocomplete(); sendBtn.disabled = true;
  if (isEMIQuery(text)) {
    await handleEMIQuery(text);
    return;
  }
  addMessage(text, 'user');
  if (langMode !== 'manual') await autoDetectLang(text);
  await callAPI(text);
}

function showAutocomplete(q) {
  if (!q) { hideAutocomplete(); return; }
  const matches = (AC[lang] || AC.en).filter(s => s.toLowerCase().includes(q.toLowerCase())).slice(0, 4);
  if (!matches.length) { hideAutocomplete(); return; }
  autocompleteInner.innerHTML = '';

}
function hideAutocomplete() { autocompleteEl.classList.remove('visible'); }

userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px'; showAutocomplete(userInput.value.trim()); });
userInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } if (e.key === 'Escape') hideAutocomplete(); });

let recognition = null, isListening = false;
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) { addMessage('Voice input is not supported in this browser. Please use Chrome.', 'bot'); return; }
  if (isListening) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR(); recognition.lang = lang === 'hi' ? 'hi-IN' : 'en-IN'; recognition.interimResults = false;
  recognition.onstart  = () => { isListening = true;  document.getElementById('micBtn').classList.add('listening'); userInput.placeholder = t().listening; };
  recognition.onresult = e  => { userInput.value = e.results[0][0].transcript; sendMessage(); };
  recognition.onend    = () => { isListening = false; document.getElementById('micBtn').classList.remove('listening'); userInput.placeholder = t().placeholder; };
  recognition.onerror  = () => { isListening = false; document.getElementById('micBtn').classList.remove('listening'); userInput.placeholder = t().placeholder; };
  recognition.start();
}

applyLang(lang, langMode);
const hasHistory = loadHistory();
if (!hasHistory) renderWelcome();
</script>
</body>
</html>
