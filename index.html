<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NBS — Banking Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235;
    --border: rgba(99,179,237,0.15); --accent: #3b82f6; --accent2: #6366f1;
    --text: #f0f4ff; --text-dim: rgba(200,210,240,0.5);
    --user-bubble: #1e3a5f; --bot-bubble: #131e35; --radius: 18px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; }
  body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

  header { width: 100%; max-width: 760px; padding: 28px 24px 0; display: flex; align-items: center; gap: 14px; animation: fadeDown 0.6s ease both; }
  .logo { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, #3b82f6, #6366f1); display: grid; place-items: center; font-family: 'DM Serif Display', serif; font-size: 18px; color: #fff; flex-shrink: 0; box-shadow: 0 0 20px rgba(99,102,241,0.4); }
  .header-text h1 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; color: var(--text); }
  .header-text p { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .status-dot { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #4ade80; }
  .status-dot span { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 10px #4ade80; animation: pulse 2s ease infinite; }
  .clear-btn { font-size: 12px; color: var(--text-dim); background: none; border: 1px solid rgba(99,179,237,0.15); border-radius: 8px; padding: 5px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .clear-btn:hover { color: var(--text); border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.08); }

  .divider { width: 100%; max-width: 760px; height: 1px; background: var(--border); margin: 18px 0 0; animation: fadeDown 0.6s 0.1s ease both; opacity: 0; }

  .chat-wrap { width: 100%; max-width: 760px; flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .chat-wrap::-webkit-scrollbar { width: 4px; }
  .chat-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .welcome { text-align: center; padding: 36px 0 18px; animation: fadeUp 0.7s 0.2s ease both; opacity: 0; }
  .welcome h2 { font-family: 'DM Serif Display', serif; font-size: 30px; font-weight: 400; color: var(--text); margin-bottom: 10px; }
  .welcome h2 em { background: linear-gradient(90deg, #3b82f6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-style: italic; }
  .welcome p { font-size: 14px; color: var(--text-dim); line-height: 1.6; max-width: 400px; margin: 0 auto 26px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .suggestion { padding: 9px 16px; border-radius: 100px; border: 1px solid rgba(99,102,241,0.3); background: rgba(99,102,241,0.08); font-size: 13px; color: #a5b4fc; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .suggestion:hover { border-color: #6366f1; color: #fff; background: rgba(99,102,241,0.2); }

  .message { display: flex; gap: 12px; animation: fadeUp 0.35s ease both; opacity: 0; }
  .message.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0; display: grid; place-items: center; font-size: 13px; font-weight: 600; margin-top: 2px; }
  .message.bot .avatar { background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; }
  .message.user .avatar { background: var(--user-bubble); border: 1px solid rgba(99,179,237,0.2); color: #93c5fd; }
  .msg-body { display: flex; flex-direction: column; max-width: 75%; }
  .message.user .msg-body { align-items: flex-end; }
  .bubble { padding: 13px 17px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; border: 1px solid var(--border); }
  .message.bot .bubble { background: var(--bot-bubble); border-radius: 4px var(--radius) var(--radius) var(--radius); color: var(--text); border-color: rgba(99,179,237,0.12); }
  .message.user .bubble { background: var(--user-bubble); border-radius: var(--radius) 4px var(--radius) var(--radius); color: #dbeafe; border-color: rgba(59,130,246,0.25); }
  .msg-time { font-size: 11px; color: var(--text-dim); margin-top: 5px; padding: 0 2px; }

  .typing .bubble { display: flex; align-items: center; gap: 5px; padding: 16px 20px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #6366f1; animation: bounce 1.2s ease infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  .input-area { width: 100%; max-width: 760px; padding: 14px 24px 26px; animation: fadeUp 0.6s 0.3s ease both; opacity: 0; }
  .input-box { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid rgba(99,102,241,0.25); border-radius: 16px; padding: 10px 10px 10px 18px; transition: border-color 0.2s, box-shadow 0.2s; }
  .input-box:focus-within { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
  #userInput { flex: 1; background: none; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; color: var(--text); resize: none; max-height: 120px; line-height: 1.5; }
  #userInput::placeholder { color: var(--text-dim); }
  #sendBtn { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, #3b82f6, #6366f1); border: none; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 2px 12px rgba(99,102,241,0.35); }
  #sendBtn:hover { transform: scale(1.06); box-shadow: 0 4px 18px rgba(99,102,241,0.5); }
  #sendBtn:active { transform: scale(0.97); }
  #sendBtn:disabled { background: var(--surface2); box-shadow: none; cursor: not-allowed; transform: none; }
  #sendBtn svg { width: 16px; height: 16px; }
  .input-hint { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 9px; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<header>
  <div class="logo">N</div>
  <div class="header-text">
    <h1>National Banking Services</h1>
    <p>AI-Powered Support Assistant</p>
  </div>
  <div class="header-right">
    <button class="clear-btn" onclick="clearChat()">Clear chat</button>
    <div class="status-dot"><span></span> Online</div>
  </div>
</header>

<div class="divider"></div>

<div class="chat-wrap" id="chatWrap">
  <div class="welcome" id="welcome">
    <h2>How can I <em>help you</em> today?</h2>
    <p>Ask me anything about accounts, loans, interest rates, fees, or banking services.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="sendSuggestion(this)">Savings account rates</button>
      <button class="suggestion" onclick="sendSuggestion(this)">How to apply for a loan?</button>
      <button class="suggestion" onclick="sendSuggestion(this)">Credit card fees</button>
      <button class="suggestion" onclick="sendSuggestion(this)">Fixed deposit interest</button>
      <button class="suggestion" onclick="sendSuggestion(this)">How to open an account?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="userInput" rows="1" placeholder="Ask about your banking needs…"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
</div>

<script>
  const chatWrap = document.getElementById('chatWrap');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const API_URL = 'http://localhost:8000/chat';
  const sessionId = 'user_' + Math.random().toString(36).slice(2, 9);

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendSuggestion(btn) { userInput.value = btn.textContent; sendMessage(); }

  function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

  function addMessage(text, role) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'bot' ? 'N' : 'U';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    body.appendChild(bubble);
    body.appendChild(time);
    msg.appendChild(avatar);
    msg.appendChild(body);
    chatWrap.appendChild(msg);

    requestAnimationFrame(() => { msg.style.opacity = '1'; });
    chatWrap.scrollTop = chatWrap.scrollHeight;
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'message bot typing';
    msg.id = 'typing';
    msg.innerHTML = `<div class="avatar">N</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chatWrap.appendChild(msg);
    requestAnimationFrame(() => { msg.style.opacity = '1'; });
    chatWrap.scrollTop = chatWrap.scrollHeight;
  }

  function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    addMessage(text, 'user');
    addTyping();
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: text, session_id: sessionId })
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.answer || 'Sorry, I could not get a response.', 'bot');
    } catch (err) {
      removeTyping();
      addMessage('Connection error. Make sure the backend server is running on port 8000.', 'bot');
    }
    sendBtn.disabled = false;
    userInput.focus();
  }

  function clearChat() {
    chatWrap.innerHTML = '';
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.id = 'welcome';
    welcome.style.opacity = '1';
    welcome.innerHTML = `
      <h2>How can I <em>help you</em> today?</h2>
      <p>Ask me anything about accounts, loans, interest rates, fees, or banking services.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">Savings account rates</button>
        <button class="suggestion" onclick="sendSuggestion(this)">How to apply for a loan?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Credit card fees</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Fixed deposit interest</button>
        <button class="suggestion" onclick="sendSuggestion(this)">How to open an account?</button>
      </div>`;
    chatWrap.appendChild(welcome);
  }
</script>
</body>
</html>
